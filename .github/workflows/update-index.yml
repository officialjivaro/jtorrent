name: Update JTorrent Backend Index

"on":
  workflow_dispatch:
  schedule:
    # GitHub Actions now supports timezone-aware schedules.
    # Runs at 12:15 AM and 12:15 PM Japan time every day.
    - cron: "30 0,12 * * *"
      timezone: "Asia/Tokyo"
  push:
    branches:
      - main
    paths:
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/update-index.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  build:
    name: Build static JSON backend
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build JTorrent JSON files
        run: python scripts/build_index.py --config config/sources.yml

      - name: Ensure Pages serves static files directly
        run: touch public/.nojekyll

      - name: Validate generated backend files
        run: |
          test -f public/data/manifest.json
          test -f public/data/search-index.min.json
          test -f public/data/search-index.summary.json
          test -f public/data/search-index.json
          test -f public/data/sources.json
          test -f public/data/shards/index.json
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path("public/data/manifest.json"),
              Path("public/data/search-index.min.json"),
              Path("public/data/search-index.summary.json"),
              Path("public/data/search-index.json"),
              Path("public/data/sources.json"),
              Path("public/data/shards/index.json"),
          ]
          for path in required:
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
          manifest = json.loads(Path("public/data/manifest.json").read_text(encoding="utf-8"))
          print(f"Generated {manifest.get('item_count', 0)} items from {manifest.get('enabled_source_count', 0)} enabled sources")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
