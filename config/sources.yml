    license_url: "https://linuxmint.com/terms.php"
    page_urls:
      - "https://linuxmint.com/download_all.php"
    max_depth: 1
    follow_link_regexes:
      - "/edition\\.php\\?id=[0-9]+"
    include_url_regexes:
      - "\\.torrent(?:$|[?#])"
    collect_magnets: false
    tags:
      - linux
      - linux-mint
      - iso
