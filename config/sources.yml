settings:
  name: "JTorrent Backend"
  # Change this after your first GitHub Pages deploy.
  base_url: "https://YOUR_GITHUB_USERNAME.github.io/jtorrent"
  # Optional. Set this only if you configure a GitHub Pages custom domain.
  custom_domain: null
  output_dir: "public"
  frontend_origin: "https://www.jtorrent.net"
  request:
    user_agent: "JTorrentBackend/0.1 (+https://www.jtorrent.net; contact: replace-me@example.com)"
    timeout_seconds: 25
    delay_seconds: 1.0
    retries: 2
    max_torrent_bytes: 5242880
  limits:
    max_items_total: 10000
    max_items_per_source: 750
  policy:
    require_authorized_sources: true
    allowed_status_values:
      - authorized
      - public-domain
      - open-source
      - creative-commons
      - open-data
    # Guardrails: this backend should not become a general pirate-index scraper.
    blocked_domains:
      - 1337x.to
      - 1337x.st
      - 1337x.is
      - thepiratebay.org
      - yts.mx
      - yts.rs
      - eztv.re
      - eztv.tf
      - rarbg.to
      - nyaa.si
      - sukebei.nyaa.si
      - limetorrents.lol
      - torrentgalaxy.to
      - kickasstorrents.to
      - bitsearch.to
      - magnetdl.com
      - zooqle.com

sources:
  - id: ubuntu_official
    name: "Official Ubuntu Releases"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://ubuntu.com/download/alternative-downloads"
    copyright_status: open-source
    license: "Official Ubuntu release torrents for Ubuntu installation images."
    license_url: "https://ubuntu.com/legal/intellectual-property-policy"
    page_urls:
      - "https://releases.ubuntu.com/"
    max_depth: 1
    follow_link_regexes:
      - "(?:^|/)(?:[0-9]{2}\\.[0-9]{2}|noble|jammy|focal|questing|plucky)/?$"
    include_url_regexes:
      - "\\.iso\\.torrent$"
    tags: [linux, ubuntu, iso, official]
    fetch_torrent_metadata: true

  - id: debian_official
    name: "Official Debian CD Images"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://www.debian.org/CD/torrent-cd/"
    copyright_status: open-source
    license: "Official Debian BitTorrent files for Debian installer images."
    license_url: "https://www.debian.org/legal/licenses/"
    page_urls:
      - "https://cdimage.debian.org/debian-cd/current/amd64/bt-cd/"
      - "https://cdimage.debian.org/debian-cd/current/amd64/bt-dvd/"
    max_depth: 0
    include_url_regexes:
      - "\\.iso\\.torrent$"
    tags: [linux, debian, iso, official]
    fetch_torrent_metadata: true

  - id: fedora_official
    name: "Official Fedora Torrents"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://fedoraproject.org/torrents/"
    copyright_status: open-source
    license: "Official Fedora Project torrent downloads."
    license_url: "https://docs.fedoraproject.org/en-US/legal/"
    page_urls:
      - "https://torrent.fedoraproject.org/torrents/"
    max_depth: 0
    include_url_regexes:
      - "\\.torrent$"
    exclude_url_regexes:
      - "debug"
    tags: [linux, fedora, iso, official]
    fetch_torrent_metadata: true

  - id: arch_official
    name: "Official Arch Linux Releases"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://archlinux.org/download/"
    copyright_status: open-source
    license: "Official Arch Linux ISO torrents and magnet links."
    license_url: "https://archlinux.org/packages/licenses/"
    page_urls:
      - "https://archlinux.org/releng/releases/"
      - "https://archlinux.org/download/"
    max_depth: 1
    follow_link_regexes:
      - "/releng/releases/[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}/?$"
    include_url_regexes:
      - "\\.torrent$"
    collect_magnets: true
    tags: [linux, arch, iso, official]
    fetch_torrent_metadata: true

  - id: linux_mint_official
    name: "Official Linux Mint Downloads"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://linuxmint.com/download.php"
    copyright_status: open-source
    license: "Official Linux Mint torrent links from linuxmint.com release pages."
    license_url: "https://linuxmint.com/terms.php"
    page_urls:
      - "https://linuxmint.com/download_all.php"
    max_depth: 1
    follow_link_regexes:
      - "/edition\\.php\\?id=[0-9]+"
    include_url_regexes:
      - "\\.torrent$"
      - "torrent"
    collect_magnets: false
    tags: [linux, linux-mint, iso, official]
    fetch_torrent_metadata: true

  - id: kali_official
    name: "Official Kali Linux Images"
    type: html_torrent_links
    enabled: true
    category: linux
    source_homepage: "https://www.kali.org/get-kali/"
    copyright_status: open-source
    license: "Official Kali Linux torrent files for Kali installation images."
    license_url: "https://www.kali.org/docs/policy/kali-linux-relationship-with-debian/"
    page_urls:
      - "https://cdimage.kali.org/kali-images/current/"
    max_depth: 0
    include_url_regexes:
      - "\\.iso\\.torrent$"
      - "\\.img\\.torrent$"
    tags: [linux, kali, iso, official]
    fetch_torrent_metadata: true

  - id: academic_torrents_datasets
    name: "Academic Torrents Datasets RSS"
    type: rss_feed
    enabled: false
    category: datasets
    source_homepage: "https://academictorrents.com/collection/datasets"
    copyright_status: open-data
    license: "Academic Torrents is intended for research datasets; verify item-level rights before enabling broad ingestion."
    feed_urls:
      - "https://academictorrents.com/collection/datasets.rss"
    tags: [datasets, research, academic-torrents]
    fetch_torrent_metadata: false

  - id: internet_archive_public_domain_example
    name: "Internet Archive Public-Domain/CC Example"
    type: internet_archive_advancedsearch
    enabled: false
    category: public-domain
    source_homepage: "https://archive.org/"
    copyright_status: public-domain
    license: "Internet Archive metadata query restricted by your configured collection/query. Verify item-level rights before enabling."
    query: "collection:prelinger AND mediatype:movies"
    rows: 50
    include_torrent_url: true
    tags: [internet-archive, public-domain, media]

manual_items:
  # Manual entries are useful for official torrents that are hard to discover automatically.
  - title: "Arch Linux latest ISO torrent"
    category: linux
    source_id: arch_manual_latest
    source_name: "Official Arch Linux Downloads"
    source_url: "https://archlinux.org/download/"
    torrent_url: "https://geo.mirror.pkgbuild.com/iso/latest/archlinux-x86_64.iso.torrent"
    copyright_status: open-source
    license: "Official Arch Linux ISO torrent."
    license_url: "https://archlinux.org/packages/licenses/"
    tags: [linux, arch, iso, official]
