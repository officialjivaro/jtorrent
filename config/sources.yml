      - research
      - academic-torrents
    fetch_torrent_metadata: false

  - id: internet_archive_prelinger_public_domain
    name: "Internet Archive Prelinger Public Domain Movies"
    type: internet_archive_advancedsearch
    enabled: true
    category: public-domain
    source_homepage: "https://archive.org/details/prelinger"
    copyright_status: public-domain
    license: "Internet Archive Prelinger collection query. Verify item-level rights before broad reuse."
    license_url: "https://archive.org/details/prelinger"
    query: "collection:prelinger AND mediatype:movies"
    rows: 250
    include_torrent_url: true
    tags:
      - internet-archive
      - public-domain
      - movies
      - prelinger

